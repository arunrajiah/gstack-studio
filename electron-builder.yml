appId: com.gstack.studio
productName: gstack Studio
copyright: Copyright © 2025 gstack Studio Contributors

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - '!**/.git'
  - '!**/node_modules/.cache'

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Publishing is handled by the GitHub Actions release job (softprops/action-gh-release).
# electron-builder must not auto-publish during the build step — the build jobs
# only have read permissions on contents.
publish: never
