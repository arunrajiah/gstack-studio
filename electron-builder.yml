appId: com.gstack.studio
productName: gstack Studio
copyright: Copyright © 2025 gstack Studio Contributors

# App icon — generated by `node scripts/generate-icon.mjs`
icon: build/icon.png

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - '!**/.git'
  - '!**/node_modules/.cache'

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64, arm64]

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Used by electron-updater at runtime to discover new releases.
# The actual upload of artifacts is handled by softprops/action-gh-release
# in CI; electron-builder only needs to know the provider so it can build
# the auto-update metadata files (latest.yml etc.).
publish:
  provider: github
  owner: arunrajiah
  repo: gstack-studio
