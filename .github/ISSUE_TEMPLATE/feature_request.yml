name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check [existing issues](https://github.com/arunrajiah/gstack-studio/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you're hitting. "I'm always frustrated when..." is a great way to start.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches or mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: dropdown
    id: scope
    attributes:
      label: Which part of the app does this affect?
      options:
        - Dashboard
        - Sprint Board
        - Browse Console
        - History
        - Settings
        - Daemon management
        - Packaging / install
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to implement this?
      options:
        - label: Yes, I'd like to open a PR for this
