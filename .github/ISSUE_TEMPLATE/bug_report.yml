name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: gstack Studio version
      placeholder: "e.g. 0.2.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - Other Linux
    validations:
      required: true

  - type: input
    id: gstack-version
    attributes:
      label: gstack version
      description: Run `git -C ~/.claude/skills/gstack log --oneline -1` in your terminal
      placeholder: "e.g. abc1234 feat: add /codex skill"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings
        2. Set workspace path to '...'
        3. Click Start Daemon
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console output
      description: Open DevTools (Cmd/Ctrl+Shift+I → Console) and paste any errors here.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, screen recordings, or additional context.
