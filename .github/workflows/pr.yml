name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── 1. Type-check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci
      - name: Run typecheck
        run: npm run typecheck

  # ── 2. PR title follows Conventional Commits ───────────────────────────────
  # Blocks merge if title doesn't start with feat/fix/docs/chore/refactor/ci/test/perf
  title-check:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|ci|test|perf|style|revert)(\(.+\))?: .{3,}'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "❌ PR title must follow Conventional Commits:"
            echo "   feat: add thing"
            echo "   fix: broken thing"
            echo "   docs: update readme"
            echo "   chore: bump dependency"
            echo ""
            echo "Got: \"$PR_TITLE\""
            exit 1
          fi
          echo "✅ Title looks good: $PR_TITLE"

  # ── 3. Auto-label based on changed files and branch name ──────────────────
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  # ── 4. Welcome first-time contributors ────────────────────────────────────
  welcome:
    name: Welcome New Contributor
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            const isFirstPR = prs.filter(
              pr => pr.user.login === context.payload.pull_request.user.login
            ).length === 1;

            if (isFirstPR) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  `👋 Hey @${context.payload.pull_request.user.login} — thanks for your first PR on gstack Studio!`,
                  ``,
                  `A few things to double-check before review:`,
                  `- [ ] \`npm run typecheck\` passes locally`,
                  `- [ ] You've manually tested the changed flow in the running app`,
                  `- [ ] No debug \`console.log\` left in`,
                  `- [ ] Screenshots added if it's a UI change`,
                  ``,
                  `@arunrajiah will take a look shortly.`,
                ].join('\n'),
              });
            }

  # ── 5. Post a diff summary comment (updates on each push) ─────────────────
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | head -40)
          COUNT=$(git diff --name-only "$BASE" "$HEAD" | wc -l | tr -d ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          ADDS=$(git diff --shortstat "$BASE" "$HEAD" | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          DELS=$(git diff --shortstat "$BASE" "$HEAD" | grep -oP '\d+ deletion' | grep -oP '\d+' || echo 0)
          echo "adds=$ADDS" >> $GITHUB_OUTPUT
          echo "dels=$DELS" >> $GITHUB_OUTPUT

      - name: Find or create summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-summary-bot -->';
            const files = `${{ steps.changed.outputs.files }}`.trim().split('\n').filter(Boolean);
            const count = '${{ steps.changed.outputs.count }}';
            const adds = '${{ steps.changed.outputs.adds }}';
            const dels = '${{ steps.changed.outputs.dels }}';

            const fileList = files.slice(0, 20).map(f => `  - \`${f}\``).join('\n');
            const more = files.length > 20 ? `\n  - …and ${files.length - 20} more` : '';

            const body = [
              marker,
              `### 📋 PR at a glance`,
              ``,
              `| | |`,
              `|---|---|`,
              `| Files changed | **${count}** |`,
              `| Lines added | **+${adds}** |`,
              `| Lines removed | **-${dels}** |`,
              ``,
              `**Changed files:**`,
              fileList + more,
              ``,
              `---`,
              `_Updated automatically on every push · Final approval required from @arunrajiah_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
